<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汉字乐园 - 选择年级</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="home-container">
    <div class="logo-container">
      <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='white' stroke='black' stroke-width='4'/><circle cx='20' cy='25' r='15' fill='black'/><circle cx='80' cy='25' r='15' fill='black'/><ellipse cx='35' cy='45' rx='10' ry='15' fill='black'/><ellipse cx='65' cy='45' rx='10' ry='15' fill='black'/><circle cx='35' cy='42' r='4' fill='white'/><circle cx='65' cy='42' r='4' fill='white'/><ellipse cx='50' cy='65' rx='8' ry='5' fill='black'/><path d='M 45 75 Q 50 85 55 75' fill='none' stroke='black' stroke-width='3'/></svg>" width="100" height="100" alt="熊猫">
      <h1>汉字乐园</h1>
    </div>
    <div class="grade-grid">
      <button onclick="selectGrade(1)">一年级</button>
      <button onclick="selectGrade(2)">二年级</button>
      <button onclick="selectGrade(3)">三年级</button>
      <button onclick="selectGrade(4)">四年级</button>
      <button onclick="selectGrade(5)">五年级</button>
      <button onclick="selectGrade(6)">六年级</button>
      <button onclick="selectGrade(7)">七年级</button>
    </div>
  </div>
  <script>
    function selectGrade(grade) {
      localStorage.setItem('selectedGrade', grade);
      window.location.href = 'app.html';
    }
  </script>
</body>
</html>
